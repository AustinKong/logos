repos:
  - repo: local
    hooks:
      - id: generate-openapi
        name: generate OpenAPI contract
        entry: npm run gen:openapi
        language: system
        pass_filenames: false
        always_run: true

      - id: fix
        name: format and autofix
        entry: npm run fix
        language: system
        pass_filenames: false
        always_run: true

      - id: lint
        name: lint
        entry: npm run lint
        language: system
        pass_filenames: false
        always_run: true
